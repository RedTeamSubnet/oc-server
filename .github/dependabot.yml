version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    labels:
      - "dependency"
      - "npm"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/packages/server"
    labels:
      - "dependency"
      - "docker"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
